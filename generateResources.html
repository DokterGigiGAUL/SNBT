<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generate Resources</title>
</head>

<body>

<pre id="output"></pre>

<script src="blueprint.js"></script>

<script>

let hasil =
"const resources = {\n\n";

blueprint.forEach(k=>{

    k.subkompetensi.forEach(item=>{

        hasil +=
`    "${item.id}": {

        ringkasan: "",

        tips: "",

        contoh: ""

    },

`;

    });

});

hasil +=
"};";

document
.getElementById("output")
.textContent = hasil;

</script>

</body>
</html>
